version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - fraud-net

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/frauddb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=fraud_prevention_super_secret_key_2024
      - JWT_EXPIRE=7d
      - ML_SERVICE_URL=http://ml-service:8000
      - FRONTEND_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      - mongo
      - redis
      - ml-service
    networks:
      - fraud-net

  ml-service:
    build:
      context: ./ml-service
      dockerfile: ../docker/Dockerfile.ml
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - PORT=8000
    networks:
      - fraud-net

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - fraud-net

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fraud-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fraud-net

networks:
  fraud-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
